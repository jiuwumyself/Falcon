# Falcon 前端 nginx：托管 SPA 静态 + 反代后端 API / Arthas 终端 WS。
# 复刻 vite.config.ts 的 dev 代理（/api→:8000、/arthas-term ws→:8011）。
# 上游名 falcon-backend = 后端 Service（K8s 集群 DNS），端口 8000=web、8011=arthas sidecar。

upstream falcon_api {
    server falcon-backend:8000;
}
upstream falcon_arthas {
    server falcon-backend:8011;
}

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    client_max_body_size 20m;   # 与后端 .jmx 10MB 上限留余量

    # SPA：路由全交给 index.html（vue-router history 模式）
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 后端 API：大 run 的 sampler-stats/error-samples 端点慢，给 120s + 关 buffering（流式响应）
    location /api/ {
        proxy_pass http://falcon_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 120s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
        proxy_buffering off;
    }

    # Django admin（后台管理 Environment / BackendListener 等），别被 SPA try_files 吞掉
    location /admin/ {
        proxy_pass http://falcon_api;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # Django admin / DRF 静态（whitenoise 托管，走后端）
    location /static/ {
        proxy_pass http://falcon_api;
        proxy_set_header Host $host;
    }
    location /media/ {
        proxy_pass http://falcon_api;
        proxy_set_header Host $host;
    }

    # Arthas Pod 终端 WebSocket → arthas_ws_proxy.py sidecar(:8011)
    location /arthas-term {
        proxy_pass http://falcon_arthas;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }
}
