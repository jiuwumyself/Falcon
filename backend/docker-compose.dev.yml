# Falcon 本地开发：InfluxDB + 3 台 falcon-agent。
#
# 启停：
#   docker compose -f backend/docker-compose.dev.yml up -d
#   docker compose -f backend/docker-compose.dev.yml down
#   docker compose -f backend/docker-compose.dev.yml down -v   # 连数据一起清
#
# 启动后建库 + 保留策略：./venv/bin/python manage.py setup_influxdb
#
# ── 多 agent 端口分配 ─────────────────────────────────────────────────────
# 单机 dev 形态下 `--scale agent=N` 会撞 host port，所以拆成 agent1/agent2/agent3
# 三个独立 service，各自固定 host port + FALCON_AGENT_REPORT_PORT。agent 容器内
# 仍 listen 9100；外面通过 `9101:9100` / `9102:9100` 映射到不同 host port，
# FALCON_AGENT_REPORT_PORT 告诉它 register 时该上报的 host port，主控按此调进来。
#
# 想只起部分：`docker compose -f ... up -d agent1 agent2`（只起 2 台）。
# 想加更多：复制 agent3 段，host port 改 9103/9104...
services:
  influxdb:
    image: influxdb:1.8
    container_name: falcon-influxdb
    ports:
      - "8086:8086"
    environment:
      - INFLUXDB_DB=jmeter
      - INFLUXDB_HTTP_AUTH_ENABLED=false
      - INFLUXDB_REPORTING_DISABLED=true
    volumes:
      - falcon-influxdb-data:/var/lib/influxdb
    restart: unless-stopped

  agent1:
    build:
      context: .
      dockerfile: agent/Dockerfile
    image: falcon-agent:1.2
    environment:
      - FALCON_MASTER_URL=${FALCON_MASTER_URL:-http://host.docker.internal:8000}
      - FALCON_AGENT_TOKEN=${FALCON_AGENT_TOKEN:-}
      - FALCON_AGENT_PORT=9100                     # 容器内 listen
      - FALCON_AGENT_REPORT_IP=${FALCON_AGENT_REPORT_IP:-127.0.0.1}
      - FALCON_AGENT_REPORT_PORT=9100              # 上报给主控的 host port
      - FALCON_MAX_VUSERS=100
      - FALCON_ORCHESTRATOR_TYPE=docker
    ports:
      - "9100:9100"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  agent2:
    build:
      context: .
      dockerfile: agent/Dockerfile
    image: falcon-agent:1.2
    environment:
      - FALCON_MASTER_URL=${FALCON_MASTER_URL:-http://host.docker.internal:8000}
      - FALCON_AGENT_TOKEN=${FALCON_AGENT_TOKEN:-}
      - FALCON_AGENT_PORT=9100
      - FALCON_AGENT_REPORT_IP=${FALCON_AGENT_REPORT_IP:-127.0.0.1}
      - FALCON_AGENT_REPORT_PORT=9101
      - FALCON_MAX_VUSERS=100
      - FALCON_ORCHESTRATOR_TYPE=docker
    ports:
      - "9101:9100"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  agent3:
    build:
      context: .
      dockerfile: agent/Dockerfile
    image: falcon-agent:1.2
    environment:
      - FALCON_MASTER_URL=${FALCON_MASTER_URL:-http://host.docker.internal:8000}
      - FALCON_AGENT_TOKEN=${FALCON_AGENT_TOKEN:-}
      - FALCON_AGENT_PORT=9100
      - FALCON_AGENT_REPORT_IP=${FALCON_AGENT_REPORT_IP:-127.0.0.1}
      - FALCON_AGENT_REPORT_PORT=9102
      - FALCON_MAX_VUSERS=100
      - FALCON_ORCHESTRATOR_TYPE=docker
    ports:
      - "9102:9100"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

volumes:
  falcon-influxdb-data:
