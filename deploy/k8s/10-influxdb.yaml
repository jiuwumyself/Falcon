# 集群内 InfluxDB 1.8（实时 Trends 时序库）。容器 env 自动建库 jmeter。
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: falcon-influxdb
  namespace: falcon
spec:
  accessModes: ["ReadWriteOnce"]
  # storageClassName: <按集群填，留空用默认 SC>
  resources:
    requests:
      storage: 20Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: falcon-influxdb
  namespace: falcon
spec:
  replicas: 1
  strategy:
    type: Recreate          # 单写时序库，不允许两副本同时挂同一卷
  selector:
    matchLabels: { app: falcon-influxdb }
  template:
    metadata:
      labels: { app: falcon-influxdb }
    spec:
      containers:
        - name: influxdb
          image: influxdb:1.8
          ports:
            - containerPort: 8086
          env:
            - { name: INFLUXDB_DB, value: "jmeter" }
            - { name: INFLUXDB_HTTP_AUTH_ENABLED, value: "false" }
            - { name: INFLUXDB_REPORTING_DISABLED, value: "true" }
          volumeMounts:
            - { name: data, mountPath: /var/lib/influxdb }
          readinessProbe:
            httpGet: { path: /ping, port: 8086 }
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: falcon-influxdb
---
apiVersion: v1
kind: Service
metadata:
  name: falcon-influxdb
  namespace: falcon
spec:
  selector: { app: falcon-influxdb }
  ports:
    - port: 8086
      targetPort: 8086
