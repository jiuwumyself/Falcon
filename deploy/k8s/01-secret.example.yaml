# 密钥模板 —— 真值不要进 git！两种用法二选一：
#
# 1) 直接 kubectl 命令建（推荐，不落文件）：
#   kubectl -n falcon create secret generic falcon-secrets \
#     --from-literal=DJANGO_SECRET_KEY="$(python -c 'import secrets;print(secrets.token_urlsafe(50))')" \
#     --from-literal=DB_PASSWORD='V1TD#(*&fiV6' \
#     --from-literal=FALCON_AGENT_TOKEN="$(python -c 'import secrets;print(secrets.token_hex(16))')" \
#     --from-literal=ZAPP_ACCOUNT='ouyangguopeng' \
#     --from-literal=ZAPP_PASSWORD='<zapp 密码>'
#
#   # SSH 型压力机密码文件（falcon-ssh-pw，挂成 /etc/falcon/ssh/.lgpw）：
#   kubectl -n falcon create secret generic falcon-ssh-pw \
#     --from-literal=.lgpw='CeShiShangHai2016'
#
# 2) 复制本文件去掉 .example、填 stringData、kubectl apply（注意别提交真值）。
apiVersion: v1
kind: Secret
metadata:
  name: falcon-secrets
  namespace: falcon
type: Opaque
stringData:
  DJANGO_SECRET_KEY: "REPLACE_RANDOM_50_CHARS"
  DB_PASSWORD: "REPLACE_POSTGRES_PASSWORD"
  FALCON_AGENT_TOKEN: "REPLACE_RANDOM_TOKEN"
  ZAPP_ACCOUNT: "REPLACE_ZAPP_ACCOUNT"
  ZAPP_PASSWORD: "REPLACE_ZAPP_PASSWORD"
---
apiVersion: v1
kind: Secret
metadata:
  name: falcon-ssh-pw
  namespace: falcon
type: Opaque
stringData:
  # SSH 型压力机共享密码（sshpass -f 读这个文件）
  .lgpw: "REPLACE_SSH_PASSWORD"
