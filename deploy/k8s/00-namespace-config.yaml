apiVersion: v1
kind: Namespace
metadata:
  name: falcon
---
# 非密配置（密码/密钥在 01-secret）。改这里后重启 backend/agent pod 生效。
apiVersion: v1
kind: ConfigMap
metadata:
  name: falcon-config
  namespace: falcon
data:
  DJANGO_DEBUG: "0"
  # ingress 域名 + 集群内 service 名（agent 回调主控用 falcon-backend）
  DJANGO_ALLOWED_HOSTS: "falcon.zhihuishu.com,falcon-backend,localhost,127.0.0.1"
  CSRF_TRUSTED_ORIGINS: "https://falcon.zhihuishu.com"

  # 外部 Postgres（db=Falcon / user=Falcon；密码在 secret）。⚠ DB_HOST/PORT 填真实地址
  DB_ENGINE: "postgres"
  DB_NAME: "Falcon"
  DB_USER: "Falcon"
  DB_HOST: "pgm-bp1nm1m734hzvi23.pg.rds.aliyuncs.com"
  DB_PORT: "5432"

  # 集群内 InfluxDB（master 读 + agent/SSH 反向隧道写都指这个 service）
  INFLUXDB_URL: "http://falcon-influxdb:8086"
  INFLUXDB_DB: "jmeter"
  INFLUXDB_RETENTION: "30d"
  AGENT_INFLUXDB_URL: "http://falcon-influxdb:8086"

  # 调度：K8s 编排（K8sAdapter 本轮仍 stub → 扩容手动 kubectl scale falcon-agent）
  ORCHESTRATOR_TYPE: "k8s"
  AGENT_K8S_NAMESPACE: "falcon"
  AGENT_K8S_DEPLOYMENT: "falcon-agent"
  MAX_VUSERS_PER_AGENT: "100"
  # 1 = 没选 agent 时主控本机 pod 跑 jmeter（首次部署可用）；生产强制分布式设 "0"
  LOCAL_FALLBACK: "1"

  # JMeter 版本（必须等于镜像里 baked 的版本，否则 services/jmeter.py 找错目录）
  JMETER_VERSION: "5.6.3"
  # SSH 型压力机密码文件（挂载自 secret falcon-ssh-pw）
  SSH_PASSWORD_FILE: "/etc/falcon/ssh/.lgpw"
